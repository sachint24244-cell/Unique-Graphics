<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Unique Graphics - Professional Printing Services by Sachin Tiwari. Services include Light Boards, ACP Letters, Acrylic Boards, Flex Banners, and more.">
    <meta name="keywords" content="Unique Graphics, Printing, Light Boards, ACP Letters, Acrylic Boards, Flex Banners, Visiting Cards, Bill Books, Pamphlets, Graphic Design">
    <meta name="author" content="Sachin Tiwari">
    <title>Unique Graphics - Print Your Imagination</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        /* CSS Variables & Reset */
        :root {
            --primary-gold: #D4AF37;
            --secondary-gold: #F3E5AB;
            --dark-bg: #121212;
            --light-bg: #1E1E1E;
            --text-white: #FFFFFF;
            --text-gray: #B3B3B3;
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-white);
            line-height: 1.6;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        ul {
            list-style: none;
        }

        /* Utility Classes */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            text-align: center;
            margin-bottom: 1rem;
            color: var(--primary-gold);
        }

        .section-subtitle {
            text-align: center;
            color: var(--text-gray);
            margin-bottom: 3rem;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .btn {
            display: inline-block;
            padding: 12px 30px;
            background: var(--primary-gold);
            color: var(--dark-bg);
            font-weight: 600;
            border-radius: 50px;
            transition: var(--transition);
            border: 2px solid var(--primary-gold);
        }

        .btn:hover {
            background: transparent;
            color: var(--primary-gold);
        }

        .btn-outline {
            background: transparent;
            color: var(--primary-gold);
            border: 2px solid var(--primary-gold);
        }

        .btn-outline:hover {
            background: var(--primary-gold);
            color: var(--dark-bg);
        }

        /* Header & Navigation */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(18, 18, 18, 0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            padding: 20px 0;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-white);
        }

        .logo span {
            color: var(--primary-gold);
        }

        .nav-links {
            display: flex;
            gap: 30px;
        }

        .nav-links a {
            font-weight: 500;
            font-size: 0.95rem;
            transition: var(--transition);
        }

        .nav-links a:hover {
            color: var(--primary-gold);
        }

        .menu-toggle {
            display: none;
            font-size: 1.5rem;
            cursor: pointer;
        }

        /* Hero Section */
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url('https://images.unsplash.com/photo-1562654501-a0ccc4d010b9?ixlib=rb-1.2.1&auto=format&fit=crop&w=1950&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .hero-content h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            margin-bottom: 20px;
            line-height: 1.2;
        }

        .hero-content h1 span {
            color: var(--primary-gold);
            display: block;
        }

        .hero-content p {
            font-size: 1.2rem;
            color: var(--text-gray);
            margin-bottom: 30px;
        }

        /* About Section */
        .about {
            padding: 100px 0;
            background: var(--light-bg);
        }

        .about-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 50px;
            align-items: center;
        }

        .about-img img {
            width: 100%;
            border-radius: 10px;
            border: 2px solid var(--primary-gold);
        }

        .about-text h3 {
            font-size: 1.8rem;
            margin-bottom: 20px;
            color: var(--primary-gold);
        }

        .owner-badge {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            border: 1px solid var(--primary-gold);
            border-radius: 5px;
            color: var(--text-gray);
            font-size: 0.9rem;
        }

        .owner-badge strong {
            color: var(--text-white);
        }

        /* Services Section */
        .services {
            padding: 100px 0;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
        }

        .service-card {
            background: var(--light-bg);
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            transition: var(--transition);
            border: 1px solid transparent;
        }

        .service-card:hover {
            transform: translateY(-10px);
            border-color: var(--primary-gold);
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.1);
        }

        .service-card i {
            font-size: 2.5rem;
            color: var(--primary-gold);
            margin-bottom: 20px;
        }

        .service-card h3 {
            font-size: 1.2rem;
            margin-bottom: 10px;
        }

        .service-card p {
            color: var(--text-gray);
            font-size: 0.9rem;
        }

        /* Portfolio Section */
        .portfolio {
            padding: 100px 0;
            background: var(--light-bg);
        }

        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .portfolio-item {
            position: relative;
            height: 250px;
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
        }

        .portfolio-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: var(--transition);
        }

        .portfolio-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: var(--transition);
        }

        .portfolio-item:hover .portfolio-overlay {
            opacity: 1;
        }

        .portfolio-item:hover img {
            transform: scale(1.1);
        }

        /* Contact Section */
        .contact {
            padding: 100px 0;
        }

        .contact-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 50px;
            background: var(--light-bg);
            padding: 50px;
            border-radius: 20px;
            border: 1px solid rgba(212, 175, 55, 0.1);
        }

        .contact-info h3 {
            color: var(--primary-gold);
            margin-bottom: 20px;
            font-size: 1.5rem;
        }

        .info-item {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }

        .info-item i {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(212, 175, 55, 0.1);
            color: var(--primary-gold);
            border-radius: 50%;
            margin-right: 15px;
        }

        form input, form textarea {
            width: 100%;
            padding: 15px;
            background: var(--dark-bg);
            border: 1px solid #333;
            color: var(--text-white);
            margin-bottom: 15px;
            border-radius: 5px;
        }

        form input:focus, form textarea:focus {
            outline: none;
            border-color: var(--primary-gold);
        }

        /* Floating WhatsApp Button */
        .whatsapp-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: #25D366;
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 999;
            transition: var(--transition);
        }

        .whatsapp-float:hover {
            transform: scale(1.1);
            background-color: #20BD5A;
        }

        /* Footer */
        footer {
            padding: 30px 0;
            background: #000;
            text-align: center;
            border-top: 1px solid #333;
        }

        footer p {
            color: var(--text-gray);
            font-size: 0.9rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .nav-links {
                position: fixed;
                top: 70px;
                right: -100%;
                width: 100%;
                height: calc(100vh - 70px);
                background: var(--light-bg);
                flex-direction: column;
                align-items: center;
                justify-content: center;
                transition: var(--transition);
            }

            .nav-links.active {
                right: 0;
            }

            .menu-toggle {
                display: block;
            }

            .hero-content h1 {
                font-size: 2.5rem;
            }

            .about-content, .contact-container {
                grid-template-columns: 1fr;
            }

            .contact-container {
                padding: 30px;
            }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header>
        <div class="container">
            <nav>
                <a href="#" class="logo">Unique <span>Graphics</span></a>
                <ul class="nav-links" id="navLinks">
                    <li><a href="#home">Home</a></li>
                    <li><a href="#about">About Us</a></li>
                    <li><a href="#services">Services</a></li>
                    <li><a href="#portfolio">Portfolio</a></li>
                    <li><a href="#contact">Contact</a></li>
                </ul>
                <div class="menu-toggle" id="menuToggle">
                    <i class="fas fa-bars"></i>
                </div>
            </nav>
        </div>
    </header>

    <!-- Hero Section -->
    <section id="home" class="hero">
        <div class="container hero-content">
